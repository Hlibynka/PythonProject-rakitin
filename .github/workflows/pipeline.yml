name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ==========================================
  # STAGE 1: TEST
  # ==========================================
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # Вкажіть версію Python, яка використовується в проєкті

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest  # Встановлюємо фреймворк для тестування
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run unit tests
        run: |
          python test.py

  # ==========================================
  # STAGE 2: BUILD
  # ==========================================
  build:
    name: Build Project
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build step
        run: |
          echo "Тут відбувається збірка проєкту"

  # ==========================================
  # STAGE 3: DEPLOY STAGING
  # ==========================================
  deploy_staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: |
          echo "Розгортання зібраного коду на Staging (тестовий сервер)"

  # ==========================================
  # STAGE 4: VERIFY STAGING
  # ==========================================
  verify_staging:
    name: Verify Staging
    needs: deploy_staging
    runs-on: ubuntu-latest
    steps:
      - name: Run Smoke Tests / Integration Tests
        run: |
          echo "Перевірка працездатності розгорнутого застосунку на Staging"

  # ==========================================
  # STAGE 5: DEPLOY PRODUCTION
  # ==========================================
  deploy_production:
    name: Deploy to Production
    needs: verify_staging
    runs-on: ubuntu-latest
    # environment: production # Можна додати для ручного підтвердження (Continuous Delivery)
    steps:
      - name: Deploy
        run: |
          echo "Фінальне розгортання на Production сервері для користувачів"